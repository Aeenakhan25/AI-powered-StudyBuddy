<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat | StudyAI</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <div class="app-container">
        <nav class="sidebar">
            <h1 class="logo">StudyAI</h1>
            <ul class="nav-links">
                <li><a href="dashboard.html"><span>📊</span> Dashboard</a></li>
                <li><a href="notes.html"><span>📝</span> Notes</a></li>
                <li><a href="chat.html" class="active"><span>🤖</span> Chat</a></li>
                <li><a href="quiz.html"><span>🎯</span> Quiz</a></li>
                <li><a href="flashcards.html"><span>🗂️</span> Flashcards</a></li>
                <li><a href="planner.html"><span>📅</span> Planner</a></li>
            </ul>
            <div style="margin-top: auto;">
                <button onclick="StudyAI.logout()" class="btn btn-glass" style="width: 100%;">Logout</button>
            </div>
        </nav>

        <main class="animate-fade" style="display: flex; flex-direction: column; height: 100vh;">
            <header>
                <h1>AI Chat</h1>
                <p style="color: var(--text-muted);">Contextual help based on your notes.</p>
            </header>

            <div class="chat-window">
                <div class="messages" id="chatMessages">
                    <div class="message ai">
                        Hello! I've analyzed your notes. How can I help you study today?
                    </div>
                </div>
                <div class="chat-input-container">
                    <div class="chat-input">
                        <input type="text" id="userInput" placeholder="Ask about your notes...">
                        <button class="btn btn-primary" id="sendBtn">Send</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
