<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz | StudyAI</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <div class="app-container">
        <nav class="sidebar">
            <h1 class="logo">StudyAI</h1>
            <ul class="nav-links">
                <li><a href="dashboard.html"><span>📊</span> Dashboard</a></li>
                <li><a href="notes.html"><span>📝</span> Notes</a></li>
                <li><a href="chat.html"><span>🤖</span> Chat</a></li>
                <li><a href="quiz.html" class="active"><span>🎯</span> Quiz</a></li>
                <li><a href="flashcards.html"><span>🗂️</span> Flashcards</a></li>
                <li><a href="planner.html"><span>📅</span> Planner</a></li>
            </ul>
            <div style="margin-top: auto;">
                <button onclick="StudyAI.logout()" class="btn btn-glass" style="width: 100%;">Logout</button>
            </div>
        </nav>

        <main class="animate-fade">
            <header>
                <h1>Quiz</h1>
                <p style="color: var(--text-muted);">Generate quizzes from your notes.</p>
            </header>

            <div class="card" style="margin-bottom: 2rem;">
                <h3>Generate New Quiz</h3>
                <div class="form-group" style="margin-top: 1rem;">
                    <label>Select a Note</label>
                    <select id="noteSelect">
                        <option value="">Loading...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Questions</label>
                    <input type="number" id="numQuestions" value="5" min="1" max="10">
                </div>
                <button class="btn btn-primary" id="generateQuizBtn">Generate</button>
            </div>

            <div id="quizContainer" class="card" style="display: none;">
                <div id="questionsList" style="display: flex; flex-direction: column; gap: 2rem;"></div>
                <div id="quizResult" style="margin-top: 3rem; text-align: center; display: none;">
                    <h3 id="scoreText">Final Score: 0/0</h3>
                    <button class="btn btn-glass" onclick="location.reload()" style="margin-top: 1rem;">Restart</button>
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
