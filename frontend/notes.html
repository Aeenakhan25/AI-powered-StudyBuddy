<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes | StudyAI</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <div class="app-container">
        <nav class="sidebar">
            <h1 class="logo">StudyAI</h1>
            <ul class="nav-links">
                <li><a href="dashboard.html"><span>📊</span> Dashboard</a></li>
                <li><a href="notes.html" class="active"><span>📝</span> Notes</a></li>
                <li><a href="chat.html"><span>🤖</span> Chat</a></li>
                <li><a href="quiz.html"><span>🎯</span> Quiz</a></li>
                <li><a href="flashcards.html"><span>🗂️</span> Flashcards</a></li>
                <li><a href="planner.html"><span>📅</span> Planner</a></li>
            </ul>
            <div style="margin-top: auto;">
                <button onclick="StudyAI.logout()" class="btn btn-glass" style="width: 100%;">Logout</button>
            </div>
        </nav>

        <main class="animate-fade">
            <header>
                <div>
                    <h1>Notes</h1>
                    <p style="color: var(--text-muted);">Organize your study materials.</p>
                </div>
                <button class="btn btn-primary" onclick="StudyAI.openNoteModal()">+ Add Note</button>
            </header>

            <div class="form-group" style="margin-bottom: 2rem; max-width: 500px;">
                <input type="text" id="noteSearch" placeholder="Search notes..." oninput="StudyAI.filterNotes(this.value)">
            </div>

            <div id="notesGrid" class="grid"></div>
        </main>
    </div>

    <div id="noteModal" class="modal-overlay" style="display: none;">
        <div class="modal-content card" style="width: 100%; max-width: 600px; cursor: default;">
            <h2 id="modalTitle">New Note</h2>
            <div class="form-group" style="margin-top: 1.5rem;">
                <label>Title</label>
                <input type="text" id="modalNoteTitle" placeholder="Title...">
            </div>
            <div class="form-group">
                <label>Content</label>
                <textarea id="modalNoteContent" rows="8" placeholder="Content..."></textarea>
            </div>
            <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 2rem;">
                <button class="btn btn-glass" onclick="StudyAI.closeNoteModal()">Cancel</button>
                <button class="btn btn-primary" id="saveModalNoteBtn">Save Note</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
